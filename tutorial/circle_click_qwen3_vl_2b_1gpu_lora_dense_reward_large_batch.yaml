    vllm_cfg:
      gpu_memory_utilization: 0.30

logger:
  log_dir: logs/circle_click_qwen3_vl_2b_lora_dense_reward_large_batch
  num_val_samples_to_print: 8
  wandb_enabled: true
  wandb:
    project: circle-click-nemorl-nemogym
    name: qwen3-vl-2b-lora-dense-reward-large-batch-attempt24
