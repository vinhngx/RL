  num_generations_per_prompt: 8
  max_num_steps: 200
  val_period: 10
  val_at_start: true
  val_at_end: true
  max_val_samples: null
  val_batch_size: 128

checkpointing:
  checkpoint_dir: results/circle_click_qwen3_vl_2b_lora_dense_reward_large_batch
