    name: oapl-qwen25-math-1p5b-dapo-10h-hfverify-lr25e8-g64x16
  tensorboard:
    log_dir: /ephemeral/nemo-rl/tensorboard/oapl_qwen25_math_1p5b_dapo_10h_hfverify_lr25e8_g64x16
  mlflow:
    run_name: oapl-qwen25-math-1p5b-dapo-10h-hfverify-lr25e8-g64x16
