# Auto-research variant: keep the viable HF verifier + G=16 setup, but reduce LR.
defaults: oapl_qwen25_math_1p5b_dapo_10h_hfverify_g64x16.yaml

checkpointing:
  checkpoint_dir: /ephemeral/nemo-rl/results/oapl_qwen25_math_1p5b_dapo_10h_hfverify_lr25e8_g64x16
  save_period: 10
  checkpoint_must_save_by: null
  training_timeout: 8h

policy:
  optimizer:
    kwargs:
      lr: 2.5e-7
      weight_decay: 0.1

logger:
