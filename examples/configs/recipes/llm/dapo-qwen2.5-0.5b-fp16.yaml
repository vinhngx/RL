# DAPO recipe for Qwen/Qwen2.5-0.5B
#
# This config is intended as an easy-to-run DAPO training script for the
# 0.5B Qwen2.5 base model. It reuses the same DAPO settings as the 7B recipe
# and switches training to fp16 for lower memory usage.
#
# Run with:
#   uv run examples/run_grpo.py --config examples/configs/recipes/llm/dapo-qwen2.5-0.5b-fp16.yaml

defaults: ../../grpo_math_1B.yaml

grpo:
  num_prompts_per_step: 512
  batch_multiplier: 3 # Multiplier for dataloader batch size calculation (batch_multiplier × num_prompts_per_step). Following DAPO dynamic sampling, the actual training batch size equals num_prompts_per_step × num_generations_per_prompt.
  max_num_steps: 10000
  use_leave_one_out_baseline: false
  val_period: 20
  max_val_samples: 960
  val_batch_size: 960
  use_dynamic_sampling: true
  reward_scaling:
    enabled: true
    target_min: -1.0
  reward_shaping:
    enabled: true
    overlong_buffer_length: 2048
    max_response_length: 14336
loss_fn:
  reference_policy_kl_penalty: 0.0
  ratio_clip_max: 0.28
  ratio_clip_c: 10
checkpointing:
  checkpoint_dir: /home/vinhn/projects/NemoRL-results/dapo-qwen2.5-0.5b-fp16
  keep_top_k: 5
  save_period: 5
  training_timeout: 1h  # e.g. "1h", "30m", or "00:01:00:00"
  model_save_format: null
policy:
  model_name: Qwen/Qwen2.5-0.5B
  precision: float16
  hf_config_overrides:
    max_position_embeddings: 16384
  train_micro_batch_size: 1
  logprob_batch_size: 1
  max_total_sequence_length: 16384
  dtensor_cfg:
    _v2: false
    context_parallel_size: 1
  megatron_cfg:
    tensor_model_parallel_size: 1
    pipeline_model_parallel_size: 1
    context_parallel_size: 1
    sequence_parallel: true
    optimizer:
      lr: 1.0e-06
      min_lr: 1.0e-06
      weight_decay: 0.1
    scheduler:
      lr_decay_iters: null
      lr_warmup_iters: 10
      lr_warmup_init: 1.0e-07
  sequence_packing:
    enabled: false
  make_sequence_length_divisible_by: ${mul:${policy.dtensor_cfg.tensor_parallel_size},
    ${mul:2, ${policy.dtensor_cfg.context_parallel_size}}}
  optimizer:
    kwargs:
      lr: 1.0e-06
      weight_decay: 0.1
  scheduler:
  - name: torch.optim.lr_scheduler.LinearLR
    kwargs:
      start_factor: 1.0e-08
      end_factor: 1.0
      total_iters: 10
  - name: torch.optim.lr_scheduler.ConstantLR
    kwargs:
      factor: 1.0
      total_iters: 10000000000
  - milestones:
    - 10
  generation:
    max_new_tokens: 16384
    vllm_cfg:
      tensor_parallel_size: 1
      gpu_memory_utilization: 0.7
      enforce_eager: true
data:
  max_input_seq_length: 2048
  train:
    dataset_name: DAPOMath17K
  validation:
    dataset_name: DAPOMathAIME2024
  default:
    prompt_file: null
env:
  math:
    num_workers: 16
    math_verify_impl: dapo_math_verify
logger:
  monitor_gpus: false
  wandb:
    project: dapo-dev
    name: dapo-qwen2.5-0.5b-fp16
  mlflow:
    experiment_name: dapo-dev
    run_name: dapo-qwen2.5-0.5b-fp16
cluster:
  gpus_per_node: 1
  num_nodes: 1
