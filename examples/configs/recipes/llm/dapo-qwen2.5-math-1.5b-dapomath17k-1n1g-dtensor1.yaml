defaults: ../../grpo_math_1B.yaml

grpo:
  num_prompts_per_step: 2
  num_generations_per_prompt: 8
  max_num_steps: 1000000
  max_val_samples: 64
  val_batch_size: 64
  val_at_start: true
  val_period: 50
  skip_reference_policy_logprobs_calculation: true
  use_leave_one_out_baseline: false
  adv_estimator:
    name: grpo
  reward_scaling:
    enabled: true
    source_min: 0.0
    source_max: 1.0
    target_min: -1.0
    target_max: 1.0
  reward_shaping:
    enabled: true
    overlong_buffer_length: 128
    overlong_buffer_penalty: 1
    max_response_length: ${policy.generation.max_new_tokens}
    stop_properly_penalty_coef: null

loss_fn:
  name: clipped_pg
  reference_policy_kl_penalty: 0.0
  ratio_clip_min: 0.2
  ratio_clip_max: 0.28
  ratio_clip_c: 10.0

checkpointing:
  enabled: true
  checkpoint_dir: results/dapo-qwen2.5-math-1.5b-dapomath17k-1n1g-dtensor1
  save_period: 50
  keep_top_k: 3

policy:
  model_name: Qwen/Qwen2.5-Math-1.5B-Instruct
  tokenizer:
    name: Qwen/Qwen2.5-Math-1.5B-Instruct
  train_global_batch_size: 16
  train_micro_batch_size: 1
  generation_batch_size: 4
  logprob_batch_size: 1
  max_total_sequence_length: 4096
  logprob_chunk_size: 2048
  make_sequence_length_divisible_by: 1
  offload_optimizer_for_logprob: true
  optimizer:
    kwargs:
      lr: 1.0e-6
      weight_decay: 0.1
  scheduler:
    - name: torch.optim.lr_scheduler.LinearLR
      kwargs:
        start_factor: 1.0e-8
        end_factor: 1.0
        total_iters: 10
    - name: torch.optim.lr_scheduler.ConstantLR
      kwargs:
        factor: 1.0
        total_iters: 10000000000
    - milestones:
        - 10
  dtensor_cfg:
    enabled: true
    tensor_parallel_size: 1
    activation_checkpointing: true
  megatron_cfg:
    enabled: false
  sequence_packing:
    enabled: false
  dynamic_batching:
    enabled: true
    train_mb_tokens: 4096
    logprob_mb_tokens: 4096
  generation:
    max_new_tokens: 3072
    vllm_cfg:
      gpu_memory_utilization: 0.45
      max_model_len: 4096

data:
  max_input_seq_length: 1024
  train:
    dataset_name: DAPOMath17K
  validation:
    dataset_name: DAPOMathAIME2024
  default:
    prompt_file: null
    system_prompt_file: examples/prompts/dapo_math_qwen3_concise.txt

env:
  math:
    num_workers: 8
    math_verify_impl: dapo_math_verify

logger:
  log_dir: logs/dapo-qwen2.5-math-1.5b-dapomath17k-1n1g-dtensor1
  wandb_enabled: true
  tensorboard_enabled: false
  monitor_gpus: true
  wandb:
    project: DAPO
    name: dapo-qwen2.5-math-1.5b-dapomath17k-1n1g-dtensor1
  mlflow:
    experiment_name: DAPO
    run_name: dapo-qwen2.5-math-1.5b-dapomath17k-1n1g-dtensor1

cluster:
  gpus_per_node: 1
  num_nodes: 1
